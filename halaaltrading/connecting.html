<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting...</title>
    
    <!-- Automatic redirect to Telegram after 2 seconds -->
    <meta http-equiv="refresh" content="2;url=https://telegram.me/+paKr569pxGg4NjVl">
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Deep Islamic Charcoal & Emerald Green Radial Background to match main card */
            background: radial-gradient(circle at center, #021a0e 0%, #050b08 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
            color: #f1f5f9;
        }

        /* Container with soft premium glow */
        .container {
            text-align: center;
            padding: 35px 25px;
            max-width: 400px;
            width: 90%;
            background: rgba(8, 26, 17, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }

        /* Spinner with Premium Shariah Colors (Emerald Green & Gold) */
        .spinner {
            border: 5px solid rgba(255, 255, 255, 0.1);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border-top: 5px solid #10b981;    /* Emerald Green */
            border-bottom: 5px solid #d4af37; /* Metallic Gold */
            animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Styled Loading Texts */
        .urdu-text {
            margin-top: 25px;
            font-size: 22px;
            color: #ffffff;
            font-weight: bold;
            direction: rtl;
        }

        .hinglish-text {
            margin-top: 10px;
            font-size: 15px;
            color: #a7f3d0; /* Soft green-tinted text */
            font-weight: 500;
        }

        /* High CTR Premium Green/Gold Button */
        .action-btn {
            margin-top: 25px;
            display: inline-block;
            padding: 12px 28px;
            background: linear-gradient(135deg, #10b981, #047857); /* Emerald to Forest Green */
            color: #ffffff;
            font-weight: bold;
            text-decoration: none;
            border-radius: 30px;
            border: 1px solid rgba(212, 175, 55, 0.4); /* Gold Border */
            font-size: 15px;
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);
            transition: all 0.3s ease;
        }
        
        .action-btn:hover {
            transform: translateY(-2px);
            background: #d4af37; /* Shifts to Gold on hover */
            color: #050b08;
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.4);
            border-color: transparent;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Islamic Theme Spinner -->
        <div class="spinner"></div>
        
        <!-- Urdu Language Loading Text -->
        <div class="urdu-text">ٹیلی گرام اوپن ہو رہا ہے، براہ کرم انتظار کریں...</div>
        
        <!-- Hinglish Line -->
        <div class="hinglish-text">Telegram open ho raha hai, please wait 2 seconds...</div>

</body>
</html>
